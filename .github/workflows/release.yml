name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          swift --version
          xcrun --sdk macosx --show-sdk-path

      - name: Build app and DMG
        run: |
          chmod +x build.sh Tools/create_dmg.sh
          ./build.sh

      - name: Create ZIP fallback
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ditto -c -k --keepParent build/KeepBright.app "dist/KeepBright-${VERSION}-macOS-universal.zip"

      - name: Generate release notes and checksums
        run: |
          CHANGELOG_SECTION="$RUNNER_TEMP/changelog-section.md"
          shasum -a 256 dist/KeepBright-*.dmg dist/KeepBright-*.zip > dist/checksums.txt

          awk -v version="$GITHUB_REF_NAME" '
            $0 == "## " version { capture = 1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md > "$CHANGELOG_SECTION"

          cat > release-notes.md <<'EOF'
          ## 本次更新

          EOF
          if [ -s "$CHANGELOG_SECTION" ]; then
            cat "$CHANGELOG_SECTION" >> release-notes.md
          else
            echo "- 本版本包含最新代码改动。" >> release-notes.md
          fi

          cat >> release-notes.md <<'EOF'

          ## 下载

          推荐下载 DMG 安装包；ZIP 作为备用下载。`checksums.txt` 中包含安装包的 SHA-256 校验值。

          ## 校验

          ```text
          EOF
          cat dist/checksums.txt >> release-notes.md
          cat >> release-notes.md <<'EOF'
          ```

          > 当前发布包使用本地临时签名，首次运行时 macOS 可能会提示安全确认。
          EOF

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" \
              --title "Keep Bright $GITHUB_REF_NAME" \
              --notes-file release-notes.md
            gh release upload "$GITHUB_REF_NAME" \
              dist/KeepBright-*.dmg \
              dist/KeepBright-*.zip \
              dist/checksums.txt \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              dist/KeepBright-*.dmg \
              dist/KeepBright-*.zip \
              dist/checksums.txt \
              --title "Keep Bright $GITHUB_REF_NAME" \
              --notes-file release-notes.md
          fi
